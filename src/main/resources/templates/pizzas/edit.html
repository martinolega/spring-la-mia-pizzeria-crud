<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Pizza</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" th:rel="stylesheet">
</head>
<body>
    <nav th:replace="fragments/navbar"></nav>

    <div class="container">
        <h1 class="text-center">Edit [[${pizza.name}]]</h1>

        <form th:action="@{/pizzas/edit/{id}(id=${pizza.id})}" th:object="${pizza}" method="post">

            <div class="mb-3">
                <label class="form-label" for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" th:errorClass="is-invalid">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                    <ul class="alert alert-danger ps-5">
                        <li th:each="error : ${#fields.errors('name')}" th:text="${error}"></li>
                    </ul>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" th:field="*{description}" class="form-control" th:errorClass="is-invalid"></textarea>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                    <ul class="alert alert-danger ps-5">
                        <li th:each="error : ${#fields.errors('description')}" th:text="${error}"></li>
                    </ul>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="price">Price</label>
                <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" th:errorClass="is-invalid">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                    <ul class="alert alert-danger ps-5">
                        <li th:each="error : ${#fields.errors('price')}" th:text="${error}"></li>
                    </ul>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="imageUrl">Image Url</label>
                <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control" th:errorClass="is-invalid">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}">
                    <ul class="alert alert-danger ps-5">
                        <li th:each="error : ${#fields.errors('imageUrl')}" th:text="${error}"></li>
                    </ul>
                </div>
            </div>

            <div class="mb-3 d-flex justify-content-evenly">
                <input type="submit" class="btn btn-primary" value="Edit pizza">
                <input type="reset" class="btn btn-secondary" value="Reset form">
            </div>
        </form>
    </div>
</body>
</html>
